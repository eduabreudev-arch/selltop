{% extends "base.html" %}
{% block title %}Redefinir senha — IAM App{% endblock %}
{% block wrapper_class %}container-sm{% endblock %}
{% block content %}
<div class="card">
  <h2>Redefinir senha</h2>
  <form method="POST">
    <div class="form-group">
      <label>Nova senha</label>
      <input type="password" name="password" required autofocus placeholder="••••••••"/>
      <p class="pw-hint">Mínimo 8 caracteres, 1 maiúscula, 1 número, 1 caractere especial.</p>
    </div>
    <button type="submit" class="btn btn-primary btn-full mt-2">Redefinir senha</button>
  </form>
  <hr class="divider"/>
  <p class="text-center text-muted">
    <a class="link" href="{{ url_for('auth.login') }}">Voltar ao login</a>
  </p>
</div>
{% endblock %}
