{% extends "base.html" %}
{% block title %}Erro {{ code }} — IAM App{% endblock %}
{% block wrapper_class %}container-sm{% endblock %}
{% block content %}
<div class="card text-center">
  <p style="font-size:48px;font-weight:500;color:#e0e0d8">{{ code }}</p>
  <p style="font-size:16px;margin:1rem 0 1.5rem">{{ message }}</p>
  <a class="btn btn-primary" href="{{ url_for('auth.dashboard') if session.user_id else url_for('auth.login') }}">
    Voltar ao início
  </a>
</div>
{% endblock %}
