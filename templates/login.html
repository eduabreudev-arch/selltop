{% extends "base.html" %}
{% block title %}Login — IAM App{% endblock %}
{% block wrapper_class %}container-sm{% endblock %}
{% block content %}
<div class="card">
  <h2>Entrar</h2>
  <form method="POST">
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" name="email" required autofocus placeholder="seu@email.com"/>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" name="password" required placeholder="••••••••"/>
    </div>
    <div class="mt-1 text-center">
      <a class="link" href="{{ url_for('auth.forgot_password') }}">Esqueci minha senha</a>
    </div>
    <button type="submit" class="btn btn-primary btn-full mt-2">Entrar</button>
  </form>
  <hr class="divider"/>
  <p class="text-center text-muted">
    Não tem conta? <a class="link" href="{{ url_for('auth.register') }}">Cadastre-se</a>
  </p>
  <p class="text-center text-muted mt-1">
    <a class="link" href="{{ url_for('auth.resend_verification') }}">Reenviar verificação de e-mail</a>
  </p>
</div>
{% endblock %}
